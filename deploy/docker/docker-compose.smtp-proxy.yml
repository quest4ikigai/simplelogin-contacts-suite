services:
  smtp-proxy:
    build:
      context: ../..
      dockerfile: apps/smtp-proxy/Dockerfile
    container_name: simplelogin-smtp-proxy
    restart: unless-stopped
    env_file: .env
    ports:
      - "2525:2525"
    volumes:
      - smtp_proxy_data:/data
      # Uncomment to mount file-backed secrets referenced by *_FILE env vars.
      # - ./secrets:/run/secrets/simplelogin-smtp-proxy:ro
      # Uncomment after placing proxy TLS cert/key files under deploy/docker/certs.
      # - ./certs:/certs:ro
    healthcheck:
      test: ["CMD", "python", "-m", "sl_smtp_proxy.healthcheck"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 10s

  fake-upstream:
    image: python:3.12-slim
    command: python /fake-smtp.py
    volumes:
      - ./fake-smtp.py:/fake-smtp.py:ro
      - ./smtp-captures:/smtp-captures
    ports:
      - "1025:1025"


volumes:
  smtp_proxy_data:
