[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "contacts-core"
version = "0.1.0"
description = "Shared generated-contact helpers for SimpleLogin Alias Suite"
license = { file = "LICENSE" }
requires-python = ">=3.8"
classifiers = [
  "License :: OSI Approved :: MIT License",
]

[tool.setuptools.packages.find]
where = ["src"]
